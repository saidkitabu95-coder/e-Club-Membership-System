<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Club - E-Club Membership System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Notification Container -->
  <div id="notificationContainer"></div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        🎓 E-Club
      </div>
      <button class="menu-toggle">☰</button>
      
      
  </nav>

  <!-- Application Section -->
  <section class="section" style="min-height: calc(100vh - 70px);">
    <div class="container" style="max-width: 700px;">
      <a href="dashboard.html" style="color: var(--primary-color); margin-bottom: var(--spacing-lg);">← Back to Dashboard</a>

      <div class="card">
        <div style="text-align: center; margin-bottom: var(--spacing-lg);">
          <div style="font-size: 3rem; margin-bottom: var(--spacing-md);">📝</div>
          <h2>Apply for Club Membership</h2>
          <p class="text-secondary">Fill out the form to apply for membership</p>
        </div>

        <form id="applicationForm">
          <div class="form-group">
            <label for="club">Select Club *</label>
            <select id="club" name="club" required>
              <option value="">Choose a club</option>
            </select>
            <div class="form-error" id="clubError"></div>
          </div>

          <div class="form-group">
            <label for="studentName">Full Name</label>
            <input type="text" id="studentName" disabled>
            <p style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-top: var(--spacing-xs);">Auto-filled from your profile</p>
          </div>

          <div class="form-group">
            <label for="studentEmail">Email Address</label>
            <input type="email" id="studentEmail" disabled>
            <p style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-top: var(--spacing-xs);">Auto-filled from your profile</p>
          </div>

          <div class="form-group">
            <label for="motivation">Motivation Statement *</label>
            <textarea id="motivation" name="motivation" placeholder="Tell us why you want to join this club and what you hope to contribute..." required></textarea>
            <p style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-top: var(--spacing-xs);">Minimum 10 characters</p>
            <div class="form-error" id="motivationError"></div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: var(--spacing-md);">Submit Application</button>
        </form>
      </div>
    </div>
  </section>



  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/clubs.js"></script>
  <script src="js/application.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Load clubs into select
    function loadClubs() {

fetch("http://127.0.0.1:8000/api/clubs/")
.then(res => res.json())
.then(clubs => {

const select = document.getElementById("club");

clubs.forEach(club => {

const option = document.createElement("option");

option.value = club.id;
option.textContent = club.name;

select.appendChild(option);

});

});

}

    // Load user data
   function loadUserData(){

const student = JSON.parse(localStorage.getItem("student"));

if(!student){

window.location.href="login.html";
return;

}

document.getElementById("studentName").value=student.full_name;
document.getElementById("studentEmail").value=student.email;

}

    // Get club ID from URL
    function getClubIdFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('id');
    }

    // Clear error
    function clearError(fieldId) {
      const errorElement = document.getElementById(fieldId + 'Error');
      if (errorElement) {
        errorElement.textContent = '';
      }
    }

    // Show error
    function showError(fieldId, message) {
      const errorElement = document.getElementById(fieldId + 'Error');
      if (errorElement) {
        errorElement.textContent = message;
      }
    }

    // Form submission
    document.getElementById('applicationForm').addEventListener('submit', (e) => {
      e.preventDefault();

      clearError('club');
      clearError('motivation');

      const clubId = document.getElementById('club').value;
      const motivation = document.getElementById('motivation').value.trim();
      const user = AuthManager.getCurrentUser();

      if (!clubId) {
        showError('club', 'Please select a club');
        return;
      }

     const student = JSON.parse(localStorage.getItem("student"));

fetch("http://127.0.0.1:8000/api/apply/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

student_id:student.id,
club_id:clubId

})

})

.then(async response=>{

const data=await response.json();

if(!response.ok){

throw data;

}

return data;

})

.then(data=>{

App.showNotification(data.message,"success");

setTimeout(()=>{

window.location.href="status.html";

},1500);

})

.catch(error=>{

App.showNotification(error.message,"error");

});

    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadClubs();
      loadUserData();

      const clubIdFromUrl = getClubIdFromUrl();
      if (clubIdFromUrl) {
        document.getElementById('club').value = clubIdFromUrl;
      }
    });
  </script>
</body>
</html>
