<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements - E-Club Membership System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Notification Container -->
  <div id="notificationContainer"></div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        🎓 E-Club
      </div>
      <button class="menu-toggle">☰</button>
      <div class="navbar-menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="announcements.html">Announcements</a>
      </div>
      
        
  </nav>

  <!-- Page Header -->
  <section class="hero" style="padding: 60px var(--spacing-md);">
    <div class="hero-content">
      <h1>Club Announcements</h1>
      <p>Stay updated with the latest club news and information</p>
    </div>
  </section>

  <!-- Announcements Section -->
  <section class="section">
    <div class="container" style="max-width: 800px;">
      <!-- Filter by Club -->
      <div style="margin-bottom: var(--spacing-lg);">
        <label for="clubFilter" style="margin-bottom: var(--spacing-sm); display: block; font-weight: 600;">Filter by Club:</label>
        <select id="clubFilter" style="padding: var(--spacing-md); width: 100%; border: 1px solid var(--border-color); border-radius: var(--radius-md);">
          <option value="">All Clubs</option>
        </select>
      </div>

      <!-- Announcements List -->
      <div id="announcementsContainer">
        <!-- Announcements will be loaded here -->
      </div>

      <!-- No Announcements -->
      <div id="noAnnouncements" class="empty-state hidden">
        <div class="empty-state-icon">📭</div>
        <p>No announcements yet</p>
      </div>
    </div>
  </section>



  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/clubs.js"></script>
  <script src="js/app.js"></script>

  <script>
    let allAnnouncements = [];
    
    let allClubs = [];

    // Load clubs filter
  

  async function loadClubsFilter() {

    const response = await fetch("http://127.0.0.1:8000/clubs/");

    allClubs = await response.json();

    const select = document.getElementById("clubFilter");

    allClubs.forEach(club => {

        const option = document.createElement("option");

        option.value = club.id;
        option.textContent = club.name;

        select.appendChild(option);

    });

    select.addEventListener("change", filterAnnouncements);

}

    // Load announcements
   async function loadAnnouncements() {

    const response = await fetch("http://127.0.0.1:8000/api/announcements/");

    allAnnouncements = await response.json();

    displayAnnouncements();

}

    // Display announcements
    
     function displayAnnouncements() {

    const container = document.getElementById("announcementsContainer");
    const noAnnouncements = document.getElementById("noAnnouncements");
    const filter = document.getElementById("clubFilter").value;

    let filtered = allAnnouncements;

    if (filter) {
        filtered = allAnnouncements.filter(
            ann => ann.club == filter
        );
    }

    if (filtered.length === 0) {

        container.innerHTML = "";
        noAnnouncements.classList.remove("hidden");
        return;

    }

    noAnnouncements.classList.add("hidden");

    container.innerHTML = filtered.map(ann => {

        const club = allClubs.find(c => c.id == ann.club);

        return `
            <div class="card mb-3">

                <h3>
                    ${club ? club.logo : "📢"} ${ann.title}
                </h3>

                <p class="text-secondary">
                    <strong>${club ? club.name : "Unknown Club"}</strong>
                    •
                    ${new Date(ann.created_at).toLocaleDateString()}
                </p>

                <p>
                    ${ann.message}
                </p>

                ${
                    club
                    ? `<a href="club-details.html?id=${club.id}" class="btn btn-outline btn-small">
                        View Club
                       </a>`
                    : ""
                }

            </div>
        `;

    }).join("");

}
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadClubsFilter();
      loadAnnouncements();
    });
  </script>
</body>
</html>
