<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Details - E-Club Membership System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Notification Container -->
  <div id="notificationContainer"></div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        🎓 E-Club
      </div>
      <button class="menu-toggle">☰</button>
      
      
    </div>    
  </nav>

  <!-- Club Details Section -->
  <section class="section">
    <div class="container">
      <a href="clubs.html" style="color: var(--primary-color); margin-bottom: var(--spacing-lg);">← Back to Clubs</a>

      <div id="clubDetailsContainer">
        <!-- Club details will be loaded here by JavaScript -->
      </div>
    </div>
  </section>

  

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/clubs.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Get club ID from URL
    function getClubIdFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('id');
    }

    // Load club details
    async function loadClubDetails() {

    try {
         const clubId = Number(getClubIdFromUrl());

        const response = await fetch(`http://127.0.0.1:8000/api/clubs/`);

        const clubs = await response.json();

        const club = clubs.find(c => c.id === clubId);

       if (!club) {
        document.getElementById('clubDetailsContainer').innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">❌</div>
                <p>Club not found</p>
                <a href="clubs.html" class="btn btn-primary btn-small">Back to Clubs</a>
            </div>
        `;
        return;
    }

     const eventResponse = await fetch("http://127.0.0.1:8000/api/events/");

     const allEvents = await eventResponse.json();
     const events = allEvents.filter(e => e.club === clubId);
     const annResponse = await fetch("http://127.0.0.1:8000/api/announcements/");

     const allAnnouncements = await annResponse.json();

     const announcements = allAnnouncements.filter(a => a.club === clubId);
     const isLoggedIn = localStorage.getItem("student") !== null;
     let actionButton = '';

    if (isLoggedIn) {

    const user = JSON.parse(localStorage.getItem("student"));

    if (user) {

        const appResponse = await fetch(
            `http://127.0.0.1:8000/api/my-applications/?student_id=${user.id}`
        );

        const applications = await appResponse.json();
      const application = applications.find(app => app.club === clubId);


        if (application) {

            if (application.status === "Approved") {

                actionButton =
                '<button class="btn btn-success" disabled>✓ Member</button>';

            } 
            else if (application.status === "Pending") {

                actionButton =
                '<button class="btn btn-warning" disabled>⏳ Application Pending</button>';

            } 
            else {

                actionButton =
                `<button class="btn btn-primary" onclick="applyClub(${clubId})">
                    Reapply
                </button>`;

            }


        } else {

            actionButton =
            `<button class="btn btn-primary" onclick="applyClub(${clubId})">
                Apply Now
            </button>`;

        }

    }

} else {

    actionButton =
    `<a href="login.html" class="btn btn-primary">
        Login to Apply
     </a>`;

}
    
const html = `

<div class="grid grid-2" style="gap: var(--spacing-xl);">

<div>

<div class="card">

<div style="font-size:5rem;text-align:center;">
${club.logo}
</div>

<h1>${club.name}</h1>

<span class="badge badge-primary">
${club.category}
</span>

</div>


<div class="card">

<h3>Quick Info</h3>

<p>
<strong>Members:</strong>
${club.memberCount}
</p>

<p>
<strong>Founded:</strong>
${club.founded}
</p>

<p>
<strong>President:</strong>
${club.president}
</p>

<p>
<strong>Fee:</strong>
${club.fee}
</p>

</div>


<div class="card">

${actionButton}

</div>


</div>


<div>

<div class="card">

<h3>About</h3>

<p>
${club.full_description}
</p>

</div>


<div class="card">

<h3>Requirements</h3>

<p>
${club.requirements}
</p>

</div>


<div class="card">

<h3>Objectives</h3>

<ul>

${
club.objectives 
?
club.objectives.map(obj => `
<li>${obj}</li>
`).join("")
:
"<li>No objectives available</li>"
}

</ul>

</div>

</div>

</div>



<div class="card">

<h3>Upcoming Events</h3>

${
events.length > 0 ?

events.map(event => `

<div>

<h4>${event.title}</h4>

<p>
📅 ${event.event_date}
<br>
📍 ${event.venue}
</p>

<p>
${event.description}
</p>

</div>

`).join("")

:

"<p>No upcoming events</p>"

}

</div>



<div class="card">

<h3>Announcements</h3>


${
announcements.length > 0 ?

announcements.map(ann => `

<div>

<h4>${ann.title}</h4>

<p>
${ann.message}
</p>

</div>

`).join("")

:

"<p>No announcements</p>"

}

</div>

`;

// Display club details
document.getElementById(
"clubDetailsContainer"
).innerHTML = html;
 
}
catch(error){

console.error("Error:", error);
document.getElementById(
"clubDetailsContainer"
).innerHTML = `
<div class="empty-state">
<h3>Failed to load club details</h3>
<p>${error.message}</p>
</div>
`;

}
}

async function applyClub(clubId) {

    const user = JSON.parse(localStorage.getItem("student"));

    if (!user) {
        alert("Please login first.");
        window.location.href = "login.html";
        return;
    }

    try {

        const response = await fetch("http://127.0.0.1:8000/api/apply/", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                student_id: user.id,
                club_id: clubId
            })

        });

        const data = await response.json();

        if (response.ok) {

            alert(data.message);

            location.reload();

        } else {

            alert(data.message);

        }

    } catch (error) {

        console.error(error);

        alert("Failed to apply.");

    }

}
// Initialize
document.addEventListener("DOMContentLoaded", loadClubDetails);

</script>
</body>
</html>
