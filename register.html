<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - E-Club Membership System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Notification Container -->
  <div id="notificationContainer"></div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        🎓 E-Club
      </div>
     
  </nav>

  <!-- Registration Section -->
  <section class="section" style="min-height: calc(100vh - 70px); display: flex; align-items: center;">
    <div class="container" style="max-width: 500px;">
      <div class="card">
        <div style="text-align: center; margin-bottom: var(--spacing-lg);">
          <div style="font-size: 3rem; margin-bottom: var(--spacing-md);">👤</div>
          <h2>Student Registration</h2>
          <p class="text-secondary">Create your account to join clubs</p>
        </div>

        <form id="registerForm">
          <div class="form-group">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" required>
            <div class="form-error" id="fullNameError"></div>
          </div>


          <div class="form-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            <div class="form-error" id="emailError"></div>
          </div>

          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <div class="form-error" id="passwordError"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
            <div class="form-error" id="confirmPasswordError"></div>
          </div>


          <div class="form-group">
            <label for="year">Year of Study:</label>
            <select id="year" name="year" required>
              <option value="">Select Year</option>
              <option value="1st Year">1st Year</option>
              <option value="2nd Year">2nd Year</option>
              <option value="3rd Year">3rd Year</option>
              <option value="4th Year">4th Year</option>
            </select>
            <div class="form-error" id="yearError"></div>
          </div>

          <div class="form-group">
            <div class="checkbox-group">
              <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
              <label for="agreeTerms" style="margin: 0;">I agree to the Terms of Service and Privacy Policy</label>
            </div>
            <div class="form-error" id="agreeTermsError"></div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: var(--spacing-md);">Register</button>

          <p style="text-align: center; color: var(--text-secondary);">
            Already have an account? <a href="login.html">Login here</a>
          </p>
        </form>
      </div>
    </div>
  </section>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Clear error message
    function clearError(fieldId) {
      const errorElement = document.getElementById(fieldId + 'Error');
      if (errorElement) {
        errorElement.textContent = '';
      }
    }

    // Show error message
    function showError(fieldId, message) {
      const errorElement = document.getElementById(fieldId + 'Error');
      if (errorElement) {
        errorElement.textContent = message;
      }
    }

    // Register form submission
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();

      // Clear all errors
      ['fullName', 'email', 'password', 'confirmPassword', 'year', 'agreeTerms'].forEach(field => clearError(field));

      const formData = {
        fullName: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        confirmPassword: document.getElementById('confirmPassword').value,
        year: document.getElementById('year').value
      };

      const agreeTerms = document.getElementById('agreeTerms').checked;

      if (!formData.year) {
        showError('year', 'Please select your year of study');
        return;
      }

      if (!agreeTerms) {
        showError('agreeTerms', 'You must agree to the Terms of Service');
        return;
      }

      if (formData.password !== formData.confirmPassword) {
        showError("confirmPassword", "Passwords do not match");
        return;
      }

      if (formData.password.length < 6) {
       showError("password", "Password must be at least 6 characters");
       return;
       }    

  
 fetch("http://127.0.0.1:8000/api/register/", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    fullName: formData.fullName,
    email: formData.email,
    password: formData.password,
    year: formData.year
  })
})
.then(async response => {
  const data = await response.json();

  if (!response.ok) {
    throw data;
  }

  return data;
})
.then(data => {
  App.showNotification(data.message, "success");

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);
})
.catch(error => {
  console.error(error);

  App.showNotification(
    error.message || "Registration failed",
    "error"
  );});
    });
  </script>
</body>
</html>
