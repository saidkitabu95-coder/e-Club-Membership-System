<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - E-Club Membership System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <!-- Notification Container -->
  <div id="notificationContainer"></div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        🎓 E-Club
      </div>
      <button class="menu-toggle">☰</button>
      
      
        <div id="loggedInLinks" class="flex-gap-md">
          <a href="dashboard.html">Dashboard</a>
          <span style="color: var(--text-secondary);">|</span>
          <button onclick="App.logout()" style="background: none; border: none; color: var(--primary-color); cursor: pointer; font-weight: 500;">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Dashboard Layout -->
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active">📊 Dashboard</a>
        <a href="clubs.html">🏛️ All Clubs</a>
        <a href="apply.html">📝 Apply for Club</a>
        <a href="status.html">📋 My Status</a>
        <a href="events.html">📅 Events</a>
        <a href="announcements.html">📢 Announcements</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
      <!-- Header -->
      <div class="dashboard-header">
        <h1 id="welcomeMessage">Welcome Back!</h1>
        <p class="user-info" id="userInfo"></p>
      </div>

      <!-- Statistics -->
      <div class="stats-grid" id="statsContainer">
        <!-- Statistics will be loaded here -->
      </div>

      <!-- Quick Actions -->
      <div class="dashboard-section">
        <h3>Quick Actions</h3>
        <div class="quick-actions">
          <a href="clubs.html" class="action-btn action-btn-primary">🔍 Browse Clubs</a>
          <a href="apply.html" class="action-btn action-btn-primary">📝 New Application</a>
          <a href="status.html" class="action-btn action-btn-primary">📋 Check Status</a>
          <a href="events.html" class="action-btn action-btn-primary">📅 View Events</a>
        </div>
      </div>

      <!-- My Clubs -->
      <div class="dashboard-section">
        <div class="section-header">
          <h3 class="section-title">My Clubs</h3>
          <div class="section-header-action">
            <a href="apply.html" class="btn btn-primary btn-small">+ Apply</a>
          </div>
        </div>
        <div id="myClubsContainer">
          <!-- My clubs will be loaded here -->
        </div>
      </div>

      <!-- Recent Announcements -->
      <div class="dashboard-section">
        <div class="section-header">
          <h3 class="section-title">Recent Announcements</h3>
          <a href="announcements.html" class="btn btn-outline btn-small">View All</a>
        </div>
        <div id="announcementsContainer">
          <!-- Announcements will be loaded here -->
        </div>
      </div>

      <!-- Upcoming Events -->
      <div class="dashboard-section">
        <div class="section-header">
          <h3 class="section-title">Upcoming Events (From Your Clubs)</h3>
          <a href="events.html" class="btn btn-outline btn-small">View All</a>
        </div>
        <div id="upcomingEventsContainer">
          <!-- Events will be loaded here -->
        </div>
      </div>
    </main>
  </div>

  <!-- Loading Spinner -->
  <div id="loadingSpinner">
    <div class="spinner"></div>
  </div>

  


 <script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/app.js"></script>
  

  <script>
    // Load dashboard data
    function loadDashboard() {
    const student = JSON.parse(localStorage.getItem("student"));

      if (!student) {
       window.location.href = "login.html";
       return;
      }

      // Update welcome message
      document.getElementById('welcomeMessage').textContent = `Welcome back, ${student.full_name}!`;
      const userInfo = document.getElementById('userInfo');

      if(userInfo){
      userInfo.innerHTML = "";
      }

     // Load statistics
     loadStatistics();

document.getElementById("myClubsContainer").innerHTML = `
<div class="empty-state">
    <div class="empty-state-icon">📭</div>
    <p>No club applications yet.</p>
</div>
`;

document.getElementById("announcementsContainer").innerHTML = `
<p>No announcements yet.</p>
`;

document.getElementById("upcomingEventsContainer").innerHTML = `
<p>No upcoming events.</p>
`;

    }




    // Load statistics
   
 async function loadStatistics(){

const student = JSON.parse(localStorage.getItem("student"));


if(!student){
    return;
}


try {


const clubsResponse = await fetch("http://127.0.0.1:8000/api/clubs/");


const clubs = await clubsResponse.json();



const appResponse = await fetch(
`http://127.0.0.1:8000/api/my-applications/?student_id=${student.id}`
);


const applications = await appResponse.json();



const pending = applications.filter(
app => app.status === "Pending"
).length;



const approved = applications.filter(
app => app.status === "Approved"
).length;



document.getElementById("statsContainer").innerHTML = `


<div class="stat-card">

<div class="stat-icon">🏛️</div>

<div class="stat-value">
${clubs.length}
</div>

<div class="stat-label">
Available Clubs
</div>

</div>



<div class="stat-card">

<div class="stat-icon">📝</div>

<div class="stat-value">
${applications.length}
</div>

<div class="stat-label">
Applications
</div>

</div>



<div class="stat-card">

<div class="stat-icon">✅</div>

<div class="stat-value">
${approved}
</div>

<div class="stat-label">
Approved Clubs
</div>

</div>



<div class="stat-card">

<div class="stat-icon">⏳</div>

<div class="stat-value">
${pending}
</div>

<div class="stat-label">
Pending
</div>

</div>


`;


}
catch(error){

console.log(error);

}


}
    // Load my clubs
  
    async function loadMyClubs(){

const student = JSON.parse(localStorage.getItem("student"));

if(!student){
    return;
}


try{


const response = await fetch(
`http://127.0.0.1:8000/api/my-applications/?student_id=${student.id}`
);


const applications = await response.json();



const container = document.getElementById(
"myClubsContainer"
);



if(applications.length === 0){

container.innerHTML = `

<div class="empty-state">

<div class="empty-state-icon">
📭
</div>

<p>You haven't applied to any clubs yet</p>

<a href="clubs.html" class="btn btn-primary btn-small">
Apply Now
</a>

</div>

`;

return;

}



container.innerHTML = applications.map(app => `


<div class="club-item">


<div class="club-info">


<div class="club-name">

${app.club_name}

</div>


<div class="club-status">

Applied on ${new Date(app.applied_at).toLocaleDateString()}

</div>


</div>



<div class="club-action">


<span class="status-badge">

${app.status}

</span>


</div>



</div>


`).join("");



}

catch(error){

console.log(error);

}

}
    // Load announcements
    async function loadAnnouncements(){

   const container = document.getElementById("announcementsContainer");


try{


const response = await fetch("http://127.0.0.1:8000/api/announcements/");


const announcements = await response.json();



if(announcements.length === 0){

container.innerHTML = `
<p class="text-secondary">
No announcements yet
</p>
`;

return;

}



container.innerHTML = announcements.slice(0,3).map(ann => `


<div class="announcement-item">


<div class="announcement-header">


<div>


<div class="announcement-title">

${ann.title}

</div>


</div>


</div>



<div class="announcement-content">

${ann.message}

</div>



</div>


`).join("");



}

catch(error){

console.log(error);

container.innerHTML = `
<p>
Failed to load announcements
</p>
`;

}


}

      

    // Load upcoming events
    async function loadUpcomingEvents(){

const student = JSON.parse(localStorage.getItem("student"));


if(!student){
    return;
}


try{


const appResponse = await fetch(`http://127.0.0.1:8000/api/my-applications/?student_id=${student.id}`);


const applications = await appResponse.json();



const eventResponse = await fetch("http://127.0.0.1:8000/api/events/");


const events = await eventResponse.json();





const clubIds = applications.map(
app => app.club
);





const myEvents = events.filter(event =>
clubIds.includes(event.club)
);



const container = document.getElementById(
"upcomingEventsContainer"
);



if(myEvents.length === 0){

container.innerHTML = `

<p class="text-secondary">
No upcoming events from your clubs yet
</p>

`;

return;

}



container.innerHTML = myEvents.map(event => `

<div class="event-item">

    <div class="event-date-box">

        <div class="event-day">
            ${new Date(event.event_date).getDate()}
        </div>

        <div class="event-month">
            ${new Date(event.event_date)
            .toLocaleString('en-US',{month:'short'})}
        </div>

    </div>


    <div class="event-info">

        <div class="event-title">
            📅 ${event.title}
        </div>


        <div class="event-details">

            <div class="event-detail">
                ⏰ ${event.event_time}
            </div>


            <div class="event-detail">
                📍 ${event.venue}
            </div>


        </div>


        <div class="event-description">
            ${event.description}
        </div>


    </div>


</div>

`).join("");



}

catch(error){

console.log(error);


document.getElementById(
"upcomingEventsContainer"
).innerHTML = `

<p>
Failed to load events
</p>

`;

}


} 

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
    loadDashboard();
    loadMyClubs();
    loadAnnouncements();
    loadUpcomingEvents();

    });
  </script>
</body>
</html>
