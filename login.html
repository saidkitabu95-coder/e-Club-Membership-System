<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - E-Club Membership System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Notification Container -->
  <div id="notificationContainer"></div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        🎓 E-Club
      </div>
        
  </nav>

  <!-- Login Section -->
  <section class="section" style="min-height: calc(100vh - 70px); display: flex; align-items: center;">
    <div class="container" style="max-width: 500px;">
      <div class="card">
        <div style="text-align: center; margin-bottom: var(--spacing-lg);">
          <div style="font-size: 3rem; margin-bottom: var(--spacing-md);">🔐</div>
          <h2>Login</h2>
          <p class="text-secondary">Access your E-Club account</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            <div class="form-error" id="emailError"></div>
          </div>

          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <div class="form-error" id="passwordError"></div>
          </div>

          <div class="form-group">
            <div class="checkbox-group">
              <input type="checkbox" id="rememberMe" name="rememberMe">
              <label for="rememberMe" style="margin: 0;">Remember me</label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: var(--spacing-md);">Login</button>

          <div style="text-align: center; margin-bottom: var(--spacing-md);">
            <a href="#" style="color: var(--primary-color); font-size: var(--font-size-sm);">Forgot Password?</a>
          </div>

          <p style="text-align: center; color: var(--text-secondary);">
            Don't have an account? <a href="register.html">Register here</a>
          </p>
        </form>

        </div>
      </div>
    </div>
  </section>


  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Pre-fill email if remembered
    document.addEventListener('DOMContentLoaded', () => {
      const rememberedEmail = AuthManager.getRememberedEmail();
      if (rememberedEmail) {
        document.getElementById('email').value = rememberedEmail;
        document.getElementById('rememberMe').checked = true;
      }
    });

    // Clear error message
    function clearError(fieldId) {
      const errorElement = document.getElementById(fieldId + 'Error');
      if (errorElement) {
        errorElement.textContent = '';
      }
    }

    // Show error message
    function showError(fieldId, message) {
      const errorElement = document.getElementById(fieldId + 'Error');
      if (errorElement) {
        errorElement.textContent = message;
      }
    }

    // Login form submission
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();

      clearError('email');
      clearError('password');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

     fetch("http://127.0.0.1:8000/api/login/", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        email: email,
        password: password
    })
})
.then(async response => {
    const data = await response.json();

    if (!response.ok) {
        throw data;
    }

    return data;
})
.then(data => {

   console.log("SERVER RESPONSE:", data);

localStorage.setItem("student", JSON.stringify(data.student));

if (rememberMe) {
    localStorage.setItem("rememberedEmail", email);
} else {
    localStorage.removeItem("rememberedEmail");
}

App.showNotification(data.message, "success");

setTimeout(() => {
    window.location.href = "dashboard.html";
}, 1500);

   
})
.catch(error => {
    console.error(error);

    App.showNotification(
        error.message || "Login failed",
        "error"
    );
});
    });  
  </script>
</body>
</html>
