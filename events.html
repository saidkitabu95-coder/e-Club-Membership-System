<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events - E-Club Membership System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Notification Container -->
  <div id="notificationContainer"></div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        🎓 E-Club
      </div>
      <button class="menu-toggle">☰</button>
      <div class="navbar-menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="events.html">Events</a>
      
      </div>
     
  </nav>

  <!-- Page Header -->
  <section class="hero" style="padding: 60px var(--spacing-md);">
    <div class="hero-content">
      <h1>Upcoming Events</h1>
      <p>Discover exciting club activities and networking opportunities</p>
    </div>
  </section>

  <!-- Events Section -->
  <section class="section">
    <div class="container">
      <div id="eventsContainer">
        <!-- Events will be loaded here -->
      </div>

      <!-- No Events -->
      <div id="noEvents" class="empty-state hidden">
        <div class="empty-state-icon">📭</div>
        <p>No upcoming events scheduled</p>
      </div>
    </div>
  </section>

  

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/clubs.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Load events
 async function loadEvents(){

    const response = await fetch("http://127.0.0.1:8000/api/events/");

    const events = await response.json();


    let container =
    document.getElementById("eventsContainer");


    container.innerHTML="";


   events.forEach(event => {

    container.innerHTML += `

    <div class="card mb-3">

        <h3>${event.title}</h3>

        <p>
            ${event.description}
        </p>

        <p>
            📅 <strong>Date:</strong> ${event.event_date}
        </p>

        <p>
            🕒 <strong>Time:</strong> ${event.event_time}
        </p>

        <p>
            📍 <strong>Venue:</strong> ${event.venue}
        </p>

    </div>

    `;

});

 
}
    // Initialize
 document.addEventListener('DOMContentLoaded', loadEvents);

  </script>
</body>
</html>
